# Supabase project configuration.
# Initialise/link with the Supabase CLI: `supabase init` (already scaffolded) then
# `supabase link --project-ref <your-ref>`. Run locally with `supabase start`.

project_id = "ultimatexspam"

[functions.game-api]
# auth mode "user" verifies the caller's JWT, so keep JWT verification ON.
# If you add a function that uses auth: "publishable" / "secret" / "none",
# set verify_jwt = false for THAT function so @supabase/server can do its own
# (key-based) auth instead of the gateway rejecting the request first.
verify_jwt = true
